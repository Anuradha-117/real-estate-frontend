<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-lg">
        <div class="card-header bg-dark text-white">
          <h3 class="mb-0">Add New Property</h3>
        </div>
        <div class="card-body bg-light">
          
          <form>
            <div class="mb-3">
              <label class="form-label fw-bold">Property Title</label>
              <input type="text" class="form-control" placeholder="e.g., Luxury 3-Bedroom Villa">
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Location</label>
                <input type="text" class="form-control" placeholder="e.g., Ratnapura Area">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Price (LKR)</label>
                <input type="number" class="form-control" placeholder="e.g., 450000">
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Property Type</label>
                <select class="form-select">
                  <option value="" disabled selected>Select a type...</option>
                  <option value="House">House</option>
                  <option value="Apartment">Apartment</option>
                  <option value="Commercial">Commercial</option>
                  <option value="Land">Land</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Status</label>
                <select class="form-select">
                  <option value="Available" selected>Available</option>
                  <option value="Sold">Sold</option>
                  <option value="Rented">Rented</option>
                </select>
              </div>
            </div>

            <div class="d-grid mt-4">
              <button type="button" class="btn btn-primary btn-lg">Save Property</button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
